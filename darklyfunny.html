<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darkly Funny</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dc-black: #050505;
    --dc-purple: #7D6B91;
    --dc-tan: #B7AD99;
    --dc-red: #A52422;
    --dc-pink: #CBBFBB;
  }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--dc-black);
    color: var(--dc-pink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* HEADER */
  .inner-header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid rgba(125, 107, 145, 0.3);
    display: flex; align-items: center; gap: 1rem;
    background: rgba(125, 107, 145, 0.06); flex-shrink: 0;
  }
  .back-btn {
    background: none; border: 1px solid rgba(125, 107, 145, 0.4);
    color: var(--dc-pink); font-family: 'Cinzel', serif;
    font-size: 0.65rem; letter-spacing: 0.15em;
    padding: 0.4rem 0.85rem; cursor: pointer; border-radius: 2px;
    text-transform: uppercase; transition: background 0.2s, border-color 0.2s;
    text-decoration: none; display: inline-block;
  }
  .back-btn:hover { background: rgba(125, 107, 145, 0.18); border-color: rgba(165, 36, 34, 0.7); }
  .inner-header-title {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.3em; color: rgba(203, 191, 187, 0.5);
    text-transform: uppercase; margin-left: auto;
  }

  /* MAIN */
  .dc-main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }
  .dc-eyebrow {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    letter-spacing: 0.3em; color: var(--dc-purple);
    text-transform: uppercase; margin-bottom: 0.75rem;
  }
  .dc-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900;
    color: var(--dc-red); line-height: 1; margin-bottom: 0.5rem;
    letter-spacing: 0.05em; text-shadow: 0 2px 20px rgba(165, 36, 34, 0.3);
  }
  .dc-subtitle { font-size: 1rem; color: var(--dc-tan); font-style: italic; margin-bottom: 2rem; max-width: 480px; }

  /* LAST LAUGH MODE */
  .final-girl-toggle {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 2rem; cursor: pointer;
  }
  .final-girl-toggle input[type="checkbox"] {
    accent-color: var(--dc-red);
    width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;
  }
  .final-girl-label {
    font-family: 'Cinzel', serif; font-size: 0.72rem;
    letter-spacing: 0.12em; color: var(--dc-tan);
    text-transform: uppercase; user-select: none;
  }

  .roll-btn {
    background: none; border: 1px solid var(--dc-purple);
    color: var(--dc-pink); font-family: 'Cinzel', serif;
    font-size: 0.85rem; letter-spacing: 0.2em;
    padding: 1rem 2.5rem; cursor: pointer; text-transform: uppercase;
    border-radius: 2px; transition: background 0.2s, border-color 0.2s; margin-bottom: 3rem;
  }
  .roll-btn:hover { background: rgba(125, 107, 145, 0.18); border-color: var(--dc-red); }
  .roll-btn:active { transform: scale(0.98); }
  .roll-btn:disabled {
    opacity: 0.35; cursor: not-allowed; border-color: rgba(125, 107, 145, 0.3);
    color: rgba(203, 191, 187, 0.4);
  }

  .result-area {
    width: 100%; max-width: 580px; min-height: 220px;
    display: flex; align-items: center; justify-content: center;
  }
  .result-empty { color: rgba(203, 191, 187, 0.35); font-style: italic; font-size: 0.95rem; }

  .movie-card {
    width: 100%; background: rgba(125, 107, 145, 0.08);
    border: 1px solid rgba(125, 107, 145, 0.35); border-radius: 4px;
    padding: 2rem; text-align: left;
    animation: fadeIn 0.4s ease; position: relative; overflow: hidden;
  }
  .movie-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--dc-red); opacity: 0.8;
  }
  .movie-card-inner { display: flex; gap: 1.5rem; align-items: flex-start; }
  .movie-thumb {
    width: 90px; flex-shrink: 0; border-radius: 2px;
    border: 1px solid rgba(125, 107, 145, 0.35);
    object-fit: cover; aspect-ratio: 2/3; background: rgba(183, 173, 153, 0.15);
  }
  .movie-thumb-missing {
    width: 90px; flex-shrink: 0; aspect-ratio: 2/3;
    border: 1px dashed rgba(125, 107, 145, 0.35); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(203, 191, 187, 0.3); font-size: 1.5rem;
  }
  .movie-text { flex: 1; min-width: 0; }
  .movie-id {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.2em; color: var(--dc-purple);
    text-transform: uppercase; margin-bottom: 0.5rem;
  }
  .movie-title {
    font-family: 'Cinzel', serif; font-size: 1.6rem; font-weight: 700;
    color: var(--dc-pink); margin-bottom: 0.35rem; line-height: 1.2;
  }
  .movie-meta { font-size: 0.85rem; color: var(--dc-tan); margin-bottom: 1rem; font-style: italic; }
  .movie-tagline { font-style: italic; color: var(--dc-red); font-size: 0.85rem; margin-bottom: 0.5rem; }
  .movie-summary {
    font-size: 1rem; color: rgba(203, 191, 187, 0.85); line-height: 1.65;
    border-top: 1px solid rgba(125, 107, 145, 0.25); padding-top: 1rem;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .rolling { display: flex; gap: 6px; align-items: center; justify-content: center; min-height: 100px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1s ease-in-out infinite; }
  .dot:nth-child(1) { background: var(--dc-red); }
  .dot:nth-child(2) { animation-delay: 0.2s; background: var(--dc-purple); }
  .dot:nth-child(3) { animation-delay: 0.4s; background: var(--dc-tan); }
  @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

  .count-badge {
    margin-top: 2rem; font-size: 0.75rem; color: rgba(203, 191, 187, 0.45);
    font-style: italic; font-family: 'Cinzel', serif; letter-spacing: 0.1em;
  }
  .no-movies {
    color: var(--dc-tan); font-style: italic; font-size: 0.95rem;
    padding: 1.5rem; border: 1px dashed rgba(125, 107, 145, 0.35);
    border-radius: 4px; text-align: center; line-height: 1.8;
  }

  .card-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }
  .lock-btn {
    display: block; flex: 1;
    background: rgba(165, 36, 34, 0.18); border: 1px solid rgba(165, 36, 34, 0.6);
    color: var(--dc-pink); font-family: 'Cinzel', serif;
    font-size: 0.75rem; letter-spacing: 0.2em; padding: 0.75rem;
    cursor: pointer; text-transform: uppercase; border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
  }
  .lock-btn:hover { background: rgba(165, 36, 34, 0.32); border-color: var(--dc-red); }
  .freeze-btn {
    display: block; background: none;
    border: 1px solid rgba(125, 107, 145, 0.6);
    color: var(--dc-purple); font-family: 'Cinzel', serif;
    font-size: 0.7rem; letter-spacing: 0.15em; padding: 0.75rem 1rem;
    cursor: pointer; text-transform: uppercase; border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
  }
  .freeze-btn:hover { background: rgba(125, 107, 145, 0.18); border-color: var(--dc-purple); }

  .frozen-area { margin-top: 1.5rem; }
  .frozen-label {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(203, 191, 187, 0.5); margin-bottom: 0.5rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .frozen-label::before { content: '☕'; }
  .unfreeze-btn {
    background: none; border: none; color: rgba(165, 36, 34, 0.7);
    font-family: 'Cinzel', serif; font-size: 0.6rem; cursor: pointer;
    letter-spacing: 0.1em; text-transform: uppercase; margin-left: auto;
  }
  .unfreeze-btn:hover { color: var(--dc-red); }
  .frozen-area .movie-card { opacity: 0.75; border-color: rgba(165, 36, 34, 0.4); }
  .frozen-area .movie-card:hover { opacity: 1; }

  /* LOCK-IN SCREEN */
  #screen-lockin {
    background: #19171c;
    align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 2rem;
    position: relative;
  }
  .lockin-main {
    display: flex; flex-direction: column; align-items: center;
    gap: 2.5rem; max-width: 480px;
  }
  .lockin-reel { width: 200px; height: auto; display: block; border-radius: 8px; }
  .lockin-message {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 700;
    color: var(--dc-pink); line-height: 1.4; letter-spacing: 0.04em;
  }
  .lockin-back {
    position: absolute; bottom: 2rem; left: 2rem;
    border-color: rgba(203, 191, 187, 0.3);
    color: rgba(203, 191, 187, 0.6);
  }
  .lockin-back:hover {
    background: rgba(203, 191, 187, 0.08);
    border-color: rgba(203, 191, 187, 0.6);
    color: var(--dc-pink);
  }

  /* KEYWORD CHIPS */
  .keyword-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
  .keyword-chip {
    font-size: 0.72rem; font-family: 'Crimson Text', serif;
    background: rgba(125, 107, 145, 0.15); border: 1px solid rgba(125, 107, 145, 0.4);
    color: var(--dc-tan); padding: 0.15rem 0.5rem; border-radius: 2px;
  }
  .keyword-more {
    font-size: 0.72rem; font-family: 'Crimson Text', serif; font-style: italic;
    color: var(--dc-tan); cursor: default; padding: 0.15rem 0.3rem;
    position: relative;
  }
  .keyword-more-popup {
    position: absolute; bottom: calc(100% + 6px); left: 0;
    background: #16141a; border: 1px solid rgba(125, 107, 145, 0.5);
    padding: 0.5rem; z-index: 100; min-width: 200px; max-width: 320px;
    flex-wrap: wrap; gap: 0.3rem;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    display: flex; border-radius: 3px;
  }
  .keyword-more:hover .keyword-more-popup {
    opacity: 1; pointer-events: auto;
  }

</style>
</head>
<body>

<!-- DARKLY FUNNY SCREEN -->
<div id="screen-darklyfunny" class="screen active">
  <div class="inner-header">
    <a class="back-btn" href="comedy.html">← Back</a>
    <a class="back-btn" href="index.html?menu">⌂ Main Menu</a>
    <span class="inner-header-title">Comedy</span>
  </div>
  <div class="dc-main">
    <p class="dc-eyebrow">Bitter, black, and brewing</p>
    <h1 class="dc-title">Darkly Funny</h1>
    <p class="dc-subtitle">When you like your comedies like your coffee. And also, you like black coffee.</p>

    <label class="final-girl-toggle">
      <input type="checkbox" id="dc-final-girl-checkbox">
      <span class="final-girl-label">Last Laugh Mode — 3 picks only</span>
    </label>

    <button class="roll-btn" id="dc-roll-btn" onclick="rollDcMovie()">✦ Pick our movie ✦</button>
    <div class="result-area" id="dc-result-area">
      <p class="result-empty">Press the button. Let's see what's funny about this.</p>
    </div>
    <p class="count-badge" id="dc-count-badge"></p>
    <div class="frozen-area" id="dc-frozen-area" style="display:none;">
      <div class="frozen-label"><span>Held pick</span><button class="unfreeze-btn" onclick="unfreezeMovie()">✕ Clear</button></div>
      <div id="dc-frozen-card"></div>
    </div>
  </div>
</div>

<!-- LOCK-IN SCREEN -->
<div id="screen-lockin" class="screen">
  <div class="lockin-main">
    <img src="" id="lockin-reel" alt="" class="lockin-reel">
    <p class="lockin-message" id="lockin-message"></p>
  </div>
  <a class="back-btn lockin-back" href="darklyfunny.html">← Choose again</a>
</div>

<script>
var DC_MOVIES = [];
var DC_THUMBNAILS = {};

/* CSV PARSER */
function parseCSVLine(line) {
  var fields = [], i = 0;
  while (i < line.length) {
    if (line[i] === '"') {
      i++;
      var val = '';
      while (i < line.length) {
        if (line[i] === '"') {
          if (line[i + 1] === '"') { val += '"'; i += 2; }
          else { i++; break; }
        } else { val += line[i]; i++; }
      }
      fields.push(val);
      if (line[i] === ',') i++;
    } else {
      var start = i;
      while (i < line.length && line[i] !== ',') i++;
      fields.push(line.slice(start, i));
      if (line[i] === ',') i++;
    }
  }
  return fields;
}

function parseCSV(text) {
  var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  var headers = parseCSVLine(lines[0]);
  var movies = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = parseCSVLine(lines[i]);
    var r = {};
    for (var j = 0; j < headers.length; j++) r[headers[j]] = vals[j] !== undefined ? vals[j] : '';
    var lang = r['original_language'];
    if (lang === 'en') lang = 'English';
    else if (lang === 'ja') lang = 'Japanese';
    else if (lang === 'fr') lang = 'French';
    else if (lang === 'ru') lang = 'Russian';
    movies.push({
      id:          r['id'],
      name:        r['name'],
      runtime:     parseInt(r['runtime_min']) || 0,
      year:        parseInt(r['release_year']) || 0,
      director:    r['director'],
      language:    lang,
      heart:       r['heart'] === 'Y',
      overview:    r['overview'],
      tagline:     r['tagline'],
      genres:      r['genres'],
      cast_top5:   r['cast_top5'],
      tmdb_rating: parseFloat(r['tmdb_rating']) || 0,
      keywords:    r['keywords'] ? r['keywords'].split(', ').filter(function(k) { return k; }) : [],
      poster_file: r['poster_file']
    });
  }
  return movies;
}

/* KEYWORD CHIPS */
function renderKeywords(keywords) {
  if (!keywords || !keywords.length) return "";
  var visible = keywords.slice(0, 5);
  var hidden = keywords.slice(5);
  var html = '<div class="keyword-chips">';
  visible.forEach(function(k) {
    html += '<span class="keyword-chip">' + escHtml(k) + '</span>';
  });
  if (hidden.length) {
    html += '<span class="keyword-more">+ ' + hidden.length + ' more';
    html += '<span class="keyword-more-popup">';
    hidden.forEach(function(k) {
      html += '<span class="keyword-chip">' + escHtml(k) + '</span>';
    });
    html += '</span></span>';
  }
  html += '</div>';
  return html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* SCREEN SWITCHING */
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById("screen-" + name).classList.add("active");
}

/* LOCK-IN */
var LOCKIN_MESSAGES = [
  "The joke's on you now.",
  "Tonight, we laugh in the dark.",
  "Bitter and brewed to perfection.",
  "Settle in. It's funnier than it should be.",
  "No sugar, no cream, no mercy.",
  "The punchline is set. No turning back.",
  "Let the discomfort carry you.",
  "This one's been chosen. Deal with it.",
  "Grab your coffee. Press play.",
  "By dark decree, this is the one."
];

var OUTRO_GIFS = [
  "outros/dezyne_3d-skeleton-25956_512.gif",
  "outros/ekkant-bat-23695_512.gif",
  "outros/havingfunandsharing-jack-o-lantern-15778_512.gif",
  "outros/kuzu420-dancing-15139_512.gif",
  "outros/kuzu420-grey-16322_512.gif",
  "outros/mxj_files-eye-22882_512.gif",
  "outros/placidplace-halloween-8548_512.gif",
  "outros/placidplace-horror-10710_512.gif"
];

function lockIn() {
  var msg = LOCKIN_MESSAGES[Math.floor(Math.random() * LOCKIN_MESSAGES.length)];
  var gif = OUTRO_GIFS[Math.floor(Math.random() * OUTRO_GIFS.length)];
  document.getElementById("lockin-message").textContent = msg;
  document.getElementById("lockin-reel").src = gif;
  showScreen("lockin");
}

/* FROZEN MOVIE STATE */
var frozenDcMovie = null;
var currentDcPick = null;

function buildCardHtml(pick, thumbs, showFreeze) {
  var parts = [];
  if (pick.year)     { parts.push(pick.year); }
  if (pick.runtime)  { parts.push(pick.runtime + " min"); }
  if (pick.director) { parts.push(pick.director); }
  if (pick.language && pick.language !== "English") { parts.push(pick.language); }
  var meta = parts.join(" · ");

  var thumbFile = thumbs[pick.id];
  var thumbHtml = thumbFile
    ? '<img class="movie-thumb" src="thumbnails/' + escHtml(thumbFile) + '" alt="" onerror="this.outerHTML=\'<div class=\\\'movie-thumb-missing\\\'>?</div>\'">'
    : '<div class="movie-thumb-missing">?</div>';

  var freezeBtn = showFreeze
    ? '<button class="freeze-btn" onclick="freezeMovie()">☕ Hold</button>'
    : '';

  return '<div class="movie-card" style="position:relative;">' +
    '<div class="movie-card-inner">' +
      thumbHtml +
      '<div class="movie-text">' +
        '<div class="movie-title">' + escHtml(pick.name) + "</div>" +
        (meta ? '<div class="movie-meta">' + meta + "</div>" : "") +
        (pick.tagline ? '<div class="movie-tagline">' + escHtml(pick.tagline) + "</div>" : "") +
        (pick.overview ? '<div class="movie-summary">' + escHtml(pick.overview) + "</div>" : "") +
        (pick.cast_top5 ? '<div class="movie-meta" style="margin-top:0.5rem;">★ ' + (pick.tmdb_rating ? pick.tmdb_rating.toFixed(1) + ' · ' : '') + escHtml(pick.cast_top5) + "</div>" : "") +
        renderKeywords(pick.keywords) +
      "</div>" +
    "</div>" +
    '<div class="card-actions">' +
      '<button class="lock-btn" onclick="lockIn()">✦ We\'re watching this one ✦</button>' +
      freezeBtn +
    "</div>" +
  "</div>";
}

function freezeMovie() {
  frozenDcMovie = currentDcPick;
  var frozenArea = document.getElementById("dc-frozen-area");
  var frozenCard = document.getElementById("dc-frozen-card");
  frozenCard.innerHTML = buildCardHtml(frozenDcMovie, DC_THUMBNAILS, false);
  frozenArea.style.display = "";
}

function unfreezeMovie() {
  frozenDcMovie = null;
  document.getElementById("dc-frozen-area").style.display = "none";
  document.getElementById("dc-frozen-card").innerHTML = "";
}

/* SHUFFLE QUEUE */
var dcShuffleQueue = [];
var dcLastLaughLives = 3;
var dcLastLaughActive = false;

function refillDcQueue() {
  dcShuffleQueue = DC_MOVIES.slice();
  for (var i = dcShuffleQueue.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = dcShuffleQueue[i]; dcShuffleQueue[i] = dcShuffleQueue[j]; dcShuffleQueue[j] = tmp;
  }
}

document.getElementById("dc-final-girl-checkbox").addEventListener("change", function() {
  dcLastLaughActive = this.checked;
  dcLastLaughLives = 3;
  document.getElementById("dc-roll-btn").disabled = false;
});

async function rollDcMovie() {
  var area  = document.getElementById("dc-result-area");
  var badge = document.getElementById("dc-count-badge");
  var btn   = document.getElementById("dc-roll-btn");

  if (dcLastLaughActive) {
    if (dcLastLaughLives <= 0) return;
    dcLastLaughLives--;
    if (dcLastLaughLives <= 0) {
      btn.disabled = true;
    }
  }

  area.innerHTML = '<div class="rolling"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  badge.textContent = "";

  await new Promise(function(r) { setTimeout(r, 800); });

  if (!DC_MOVIES.length) {
    area.innerHTML = '<div class="no-movies">No movies in the list yet.</div>';
    return;
  }

  if (!dcShuffleQueue.length) { refillDcQueue(); }
  var pick = dcShuffleQueue.pop();
  currentDcPick = pick;

  var remaining = dcShuffleQueue.length;
  var queueNote = dcLastLaughActive
    ? (dcLastLaughLives > 0 ? dcLastLaughLives + " pick" + (dcLastLaughLives !== 1 ? "s" : "") + " remaining" : "No more picks — the pot's empty!")
    : (remaining > 0 ? remaining + " left before any repeats" : "Full rotation complete — reshuffling...");

  area.innerHTML = buildCardHtml(pick, DC_THUMBNAILS, true);
  badge.textContent = queueNote;
}

/* INIT */
(function init() {
  fetch('./movies_enriched.csv')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var movies = parseCSV(text);
      movies.forEach(function(m) {
        if (m.id && m.id.startsWith('BLKCM')) {
          DC_MOVIES.push(m);
          DC_THUMBNAILS[m.id] = m.poster_file || (m.id + '.jpeg');
        }
      });
    })
    .catch(function(err) {
      document.body.innerHTML = '<div style="color:red;padding:2rem;font-family:monospace">Failed to load movie data: ' + err.message + '</div>';
    });
})();
</script>
</body>
</html>
