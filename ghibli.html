<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Ghibli</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ghibli-bg: #a3c5e0;
    --ghibli-green: #7d9b5f;
    --ghibli-green-deep: #4f6b3a;
    --ghibli-cream: #f1dbb6;
    --ghibli-tan: #e3bba1;
    --ghibli-pink: #f0a3b0;
    --ghibli-ink: #36422c;
    --ghibli-muted: #6f7e5c;
  }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--ghibli-bg);
    color: var(--ghibli-ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* HEADER */
  .inner-header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid rgba(79, 107, 58, 0.3);
    display: flex; align-items: center; gap: 1rem;
    background: rgba(255, 255, 255, 0.2); flex-shrink: 0;
  }
  .back-btn {
    background: none; border: 1px solid rgba(79, 107, 58, 0.4);
    color: var(--ghibli-green-deep); font-family: 'Cinzel', serif;
    font-size: 0.65rem; letter-spacing: 0.15em;
    padding: 0.4rem 0.85rem; cursor: pointer; border-radius: 2px;
    text-transform: uppercase; transition: background 0.2s, border-color 0.2s;
    text-decoration: none; display: inline-block;
  }
  .back-btn:hover { background: rgba(125, 155, 95, 0.18); border-color: rgba(79, 107, 58, 0.7); }
  .inner-header-title {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.3em; color: rgba(79, 107, 58, 0.55);
    text-transform: uppercase; margin-left: auto;
  }

  /* MAIN */
  .ghibli-main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }
  .ghibli-critters {
    display: flex; justify-content: center; gap: 1rem;
    pointer-events: none; margin-bottom: 1.5rem;
  }
  .ghibli-critters img { width: 120px; height: auto; display: block; border-radius: 6px; }
  .ghibli-eyebrow {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    letter-spacing: 0.3em; color: var(--ghibli-muted);
    text-transform: uppercase; margin-bottom: 0.75rem;
  }
  .ghibli-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900;
    color: var(--ghibli-green-deep); line-height: 1; margin-bottom: 0.5rem;
    letter-spacing: 0.05em; text-shadow: 0 2px 20px rgba(255, 255, 255, 0.4);
  }
  .ghibli-subtitle { font-size: 1rem; color: var(--ghibli-muted); font-style: italic; margin-bottom: 2rem; }

  /* SPIRITED MODE */
  .final-girl-toggle {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 2rem; cursor: pointer;
  }
  .final-girl-toggle input[type="checkbox"] {
    accent-color: var(--ghibli-pink);
    width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;
  }
  .final-girl-label {
    font-family: 'Cinzel', serif; font-size: 0.72rem;
    letter-spacing: 0.12em; color: var(--ghibli-muted);
    text-transform: uppercase; user-select: none;
  }

  .roll-btn {
    background: none; border: 1px solid var(--ghibli-green);
    color: var(--ghibli-green-deep); font-family: 'Cinzel', serif;
    font-size: 0.85rem; letter-spacing: 0.2em;
    padding: 1rem 2.5rem; cursor: pointer; text-transform: uppercase;
    border-radius: 2px; transition: background 0.2s, border-color 0.2s; margin-bottom: 3rem;
  }
  .roll-btn:hover { background: rgba(125, 155, 95, 0.18); border-color: var(--ghibli-green-deep); }
  .roll-btn:active { transform: scale(0.98); }
  .roll-btn:disabled {
    opacity: 0.35; cursor: not-allowed; border-color: rgba(125, 155, 95, 0.3);
    color: rgba(79, 107, 58, 0.4);
  }

  .result-area {
    width: 100%; max-width: 580px; min-height: 220px;
    display: flex; align-items: center; justify-content: center;
  }
  .result-empty { color: rgba(54, 66, 44, 0.4); font-style: italic; font-size: 0.95rem; }

  .movie-card {
    width: 100%; background: rgba(241, 219, 182, 0.65);
    border: 1px solid rgba(79, 107, 58, 0.3); border-radius: 4px;
    padding: 2rem; text-align: left;
    animation: fadeIn 0.4s ease; position: relative; overflow: hidden;
    backdrop-filter: blur(2px);
  }
  .movie-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--ghibli-green); opacity: 0.7;
  }
  .movie-card-inner { display: flex; gap: 1.5rem; align-items: flex-start; }
  .movie-thumb {
    width: 90px; flex-shrink: 0; border-radius: 2px;
    border: 1px solid rgba(79, 107, 58, 0.3);
    object-fit: cover; aspect-ratio: 2/3; background: rgba(227, 187, 161, 0.4);
  }
  .movie-thumb-missing {
    width: 90px; flex-shrink: 0; aspect-ratio: 2/3;
    border: 1px dashed rgba(79, 107, 58, 0.3); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(79, 107, 58, 0.3); font-size: 1.5rem;
  }
  .movie-text { flex: 1; min-width: 0; }
  .movie-id {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.2em; color: var(--ghibli-green);
    text-transform: uppercase; margin-bottom: 0.5rem;
  }
  .movie-title {
    font-family: 'Cinzel', serif; font-size: 1.6rem; font-weight: 700;
    color: var(--ghibli-green-deep); margin-bottom: 0.35rem; line-height: 1.2;
  }
  .movie-meta { font-size: 0.85rem; color: var(--ghibli-muted); margin-bottom: 1rem; font-style: italic; }
  .movie-tagline { font-style: italic; color: #b07242; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .movie-summary {
    font-size: 1rem; color: rgba(54, 66, 44, 0.85); line-height: 1.65;
    border-top: 1px solid rgba(79, 107, 58, 0.2); padding-top: 1rem;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .rolling { display: flex; gap: 6px; align-items: center; justify-content: center; min-height: 100px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1s ease-in-out infinite; }
  .dot:nth-child(1) { background: var(--ghibli-green); }
  .dot:nth-child(2) { animation-delay: 0.2s; background: var(--ghibli-pink); }
  .dot:nth-child(3) { animation-delay: 0.4s; background: var(--ghibli-tan); }
  @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

  .count-badge {
    margin-top: 2rem; font-size: 0.75rem; color: rgba(79, 107, 58, 0.5);
    font-style: italic; font-family: 'Cinzel', serif; letter-spacing: 0.1em;
  }
  .no-movies {
    color: var(--ghibli-muted); font-style: italic; font-size: 0.95rem;
    padding: 1.5rem; border: 1px dashed rgba(79, 107, 58, 0.3);
    border-radius: 4px; text-align: center; line-height: 1.8;
  }

  /* SPIRIT LIVES */
  .ghost-lives {
    position: absolute; bottom: 1rem; right: 1rem;
    display: flex; gap: 0.4rem; align-items: flex-end;
    pointer-events: none; z-index: 10;
  }
  .ghost-life {
    width: 40px; height: auto; display: block;
    transition: opacity 0.1s;
  }
  .ghost-life.dying {
    animation: ghostFall 0.6s ease-in forwards;
  }
  @keyframes ghostFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(60px) rotate(20deg); }
  }

  .card-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }
  .lock-btn {
    display: block; flex: 1;
    background: rgba(125, 155, 95, 0.15); border: 1px solid rgba(79, 107, 58, 0.5);
    color: var(--ghibli-green-deep); font-family: 'Cinzel', serif;
    font-size: 0.75rem; letter-spacing: 0.2em; padding: 0.75rem;
    cursor: pointer; text-transform: uppercase; border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
  }
  .lock-btn:hover { background: rgba(125, 155, 95, 0.3); border-color: var(--ghibli-green); }
  .freeze-btn {
    display: block; background: none;
    border: 1px solid rgba(240, 163, 176, 0.6);
    color: #c25c6e; font-family: 'Cinzel', serif;
    font-size: 0.7rem; letter-spacing: 0.15em; padding: 0.75rem 1rem;
    cursor: pointer; text-transform: uppercase; border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
  }
  .freeze-btn:hover { background: rgba(240, 163, 176, 0.15); border-color: var(--ghibli-pink); }

  .frozen-area { margin-top: 1.5rem; }
  .frozen-label {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(79, 107, 58, 0.6); margin-bottom: 0.5rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .frozen-label::before { content: '✿'; }
  .unfreeze-btn {
    background: none; border: none; color: rgba(194, 92, 110, 0.7);
    font-family: 'Cinzel', serif; font-size: 0.6rem; cursor: pointer;
    letter-spacing: 0.1em; text-transform: uppercase; margin-left: auto;
  }
  .unfreeze-btn:hover { color: var(--ghibli-pink); }
  .frozen-area .movie-card { opacity: 0.75; border-color: rgba(240, 163, 176, 0.4); }
  .frozen-area .movie-card:hover { opacity: 1; }

  /* LOCK-IN SCREEN */
  #screen-lockin {
    background: #44607a;
    align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 2rem;
    position: relative;
  }
  .lockin-main {
    display: flex; flex-direction: column; align-items: center;
    gap: 2.5rem; max-width: 480px;
  }
  .lockin-reel { width: 200px; height: auto; display: block; border-radius: 8px; }
  .lockin-message {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 700;
    color: var(--ghibli-cream); line-height: 1.4; letter-spacing: 0.04em;
  }
  .lockin-back {
    position: absolute; bottom: 2rem; left: 2rem;
    border-color: rgba(241, 219, 182, 0.3);
    color: rgba(241, 219, 182, 0.6);
  }
  .lockin-back:hover {
    background: rgba(241, 219, 182, 0.08);
    border-color: rgba(241, 219, 182, 0.6);
    color: var(--ghibli-cream);
  }

  /* KEYWORD CHIPS */
  .keyword-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
  .keyword-chip {
    font-size: 0.72rem; font-family: 'Crimson Text', serif;
    background: rgba(125, 155, 95, 0.2); border: 1px solid rgba(79, 107, 58, 0.35);
    color: var(--ghibli-green-deep); padding: 0.15rem 0.5rem; border-radius: 2px;
  }
  .keyword-more {
    font-size: 0.72rem; font-family: 'Crimson Text', serif; font-style: italic;
    color: var(--ghibli-muted); cursor: default; padding: 0.15rem 0.3rem;
    position: relative;
  }
  .keyword-more-popup {
    position: absolute; bottom: calc(100% + 6px); left: 0;
    background: #f1dbb6; border: 1px solid rgba(79, 107, 58, 0.5);
    padding: 0.5rem; z-index: 100; min-width: 200px; max-width: 320px;
    flex-wrap: wrap; gap: 0.3rem;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    display: flex; border-radius: 3px;
  }
  .keyword-more:hover .keyword-more-popup {
    opacity: 1; pointer-events: auto;
  }

</style>
</head>
<body>

<!-- GHIBLI SCREEN -->
<div id="screen-ghibli" class="screen active">
  <div class="inner-header">
    <a class="back-btn" href="animated.html">← Back</a>
    <a class="back-btn" href="index.html?menu">⌂ Main Menu</a>
    <span class="inner-header-title">Animated</span>
  </div>
  <div class="ghibli-main">
    <div class="ghibli-critters">
      <img src="assets/tumblr_cd46bd4bfe2efa50109ab3b5f4180769_66ae32f8_400.webp" alt="">
    </div>
    <p class="ghibli-eyebrow">The spirits are gathering</p>
    <h1 class="ghibli-title">Studio Ghibli</h1>
    <p class="ghibli-subtitle">Spirits, skies, and quiet magic.</p>

    <label class="final-girl-toggle">
      <input type="checkbox" id="ghibli-final-girl-checkbox">
      <span class="final-girl-label">Spirited Mode — 3 picks only</span>
    </label>

    <button class="roll-btn" id="ghibli-roll-btn" onclick="rollGhibliMovie()">✦ Pick our movie ✦</button>
    <div class="result-area" id="ghibli-result-area">
      <p class="result-empty">Press the button. The wind will decide.</p>
    </div>
    <p class="count-badge" id="ghibli-count-badge"></p>
    <div class="frozen-area" id="ghibli-frozen-area" style="display:none;">
      <div class="frozen-label"><span>Held pick</span><button class="unfreeze-btn" onclick="unfreezeMovie()">✕ Clear</button></div>
      <div id="ghibli-frozen-card"></div>
    </div>
  </div>
  <div class="ghost-lives" id="ghibli-ghost-lives"></div>
</div>

<!-- LOCK-IN SCREEN -->
<div id="screen-lockin" class="screen">
  <div class="lockin-main">
    <img src="" id="lockin-reel" alt="" class="lockin-reel">
    <p class="lockin-message" id="lockin-message"></p>
  </div>
  <a class="back-btn lockin-back" href="ghibli.html">← Choose again</a>
</div>

<script>
var GHIBLI_MOVIES = [];
var GHIBLI_THUMBNAILS = {};

/* CSV PARSER */
function parseCSVLine(line) {
  var fields = [], i = 0;
  while (i < line.length) {
    if (line[i] === '"') {
      i++;
      var val = '';
      while (i < line.length) {
        if (line[i] === '"') {
          if (line[i + 1] === '"') { val += '"'; i += 2; }
          else { i++; break; }
        } else { val += line[i]; i++; }
      }
      fields.push(val);
      if (line[i] === ',') i++;
    } else {
      var start = i;
      while (i < line.length && line[i] !== ',') i++;
      fields.push(line.slice(start, i));
      if (line[i] === ',') i++;
    }
  }
  return fields;
}

function parseCSV(text) {
  var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  var headers = parseCSVLine(lines[0]);
  var movies = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = parseCSVLine(lines[i]);
    var r = {};
    for (var j = 0; j < headers.length; j++) r[headers[j]] = vals[j] !== undefined ? vals[j] : '';
    var lang = r['original_language'];
    if (lang === 'en') lang = 'English';
    else if (lang === 'ja') lang = 'Japanese';
    else if (lang === 'fr') lang = 'French';
    else if (lang === 'ru') lang = 'Russian';
    movies.push({
      id:          r['id'],
      name:        r['name'],
      runtime:     parseInt(r['runtime_min']) || 0,
      year:        parseInt(r['release_year']) || 0,
      director:    r['director'],
      language:    lang,
      heart:       r['heart'] === 'Y',
      overview:    r['overview'],
      tagline:     r['tagline'],
      genres:      r['genres'],
      cast_top5:   r['cast_top5'],
      tmdb_rating: parseFloat(r['tmdb_rating']) || 0,
      keywords:    r['keywords'] ? r['keywords'].split(', ').filter(function(k) { return k; }) : [],
      poster_file: r['poster_file']
    });
  }
  return movies;
}

/* KEYWORD CHIPS */
function renderKeywords(keywords) {
  if (!keywords || !keywords.length) return "";
  var visible = keywords.slice(0, 5);
  var hidden = keywords.slice(5);
  var html = '<div class="keyword-chips">';
  visible.forEach(function(k) {
    html += '<span class="keyword-chip">' + escHtml(k) + '</span>';
  });
  if (hidden.length) {
    html += '<span class="keyword-more">+ ' + hidden.length + ' more';
    html += '<span class="keyword-more-popup">';
    hidden.forEach(function(k) {
      html += '<span class="keyword-chip">' + escHtml(k) + '</span>';
    });
    html += '</span></span>';
  }
  html += '</div>';
  return html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* SCREEN SWITCHING */
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById("screen-" + name).classList.add("active");
}

/* LOCK-IN */
var LOCKIN_MESSAGES = [
  "The wind has spoken.",
  "Tonight, we wander somewhere magical.",
  "The spirits have chosen well.",
  "Settle in. The journey begins.",
  "A gentle adventure awaits.",
  "The path is set. No turning back.",
  "Let the daydream carry you.",
  "The forest has made its choice.",
  "Catch the breeze. Press play.",
  "By the river's blessing, this is the one."
];

var OUTRO_GIFS = [
  "outros/dezyne_3d-skeleton-25956_512.gif",
  "outros/ekkant-bat-23695_512.gif",
  "outros/havingfunandsharing-jack-o-lantern-15778_512.gif",
  "outros/kuzu420-dancing-15139_512.gif",
  "outros/kuzu420-grey-16322_512.gif",
  "outros/manegpx-cuckoo-clock-25728_256.gif",
  "outros/mxj_files-eye-22882_512.gif",
  "outros/placidplace-halloween-8548_512.gif",
  "outros/placidplace-horror-10710_512.gif"
];

function lockIn() {
  var msg = LOCKIN_MESSAGES[Math.floor(Math.random() * LOCKIN_MESSAGES.length)];
  var gif = OUTRO_GIFS[Math.floor(Math.random() * OUTRO_GIFS.length)];
  document.getElementById("lockin-message").textContent = msg;
  document.getElementById("lockin-reel").src = gif;
  showScreen("lockin");
}

/* FROZEN MOVIE STATE */
var frozenGhibliMovie = null;
var currentGhibliPick = null;

function buildCardHtml(pick, thumbs, showFreeze) {
  var parts = [];
  if (pick.year)     { parts.push(pick.year); }
  if (pick.runtime)  { parts.push(pick.runtime + " min"); }
  if (pick.director) { parts.push(pick.director); }
  if (pick.language && pick.language !== "English") { parts.push(pick.language); }
  var meta = parts.join(" · ");

  var thumbFile = thumbs[pick.id];
  var thumbHtml = thumbFile
    ? '<img class="movie-thumb" src="thumbnails/' + escHtml(thumbFile) + '" alt="" onerror="this.outerHTML=\'<div class=\\\'movie-thumb-missing\\\'>?</div>\'">'
    : '<div class="movie-thumb-missing">?</div>';

  var heartHtml = pick.heart
    ? '<img src="assets/pikura-heart-20751_128.gif" alt="♥" style="width:28px;height:auto;position:absolute;top:0.75rem;left:0.75rem;">'
    : "";

  var freezeBtn = showFreeze
    ? '<button class="freeze-btn" onclick="freezeMovie()">✿ Hold</button>'
    : '';

  return '<div class="movie-card" style="position:relative;">' +
    heartHtml +
    '<div class="movie-card-inner">' +
      thumbHtml +
      '<div class="movie-text">' +
        '<div class="movie-title">' + escHtml(pick.name) + "</div>" +
        (meta ? '<div class="movie-meta">' + meta + "</div>" : "") +
        (pick.tagline ? '<div class="movie-tagline">' + escHtml(pick.tagline) + "</div>" : "") +
        (pick.overview ? '<div class="movie-summary">' + escHtml(pick.overview) + "</div>" : "") +
        (pick.cast_top5 ? '<div class="movie-meta" style="margin-top:0.5rem;">★ ' + (pick.tmdb_rating ? pick.tmdb_rating.toFixed(1) + ' · ' : '') + escHtml(pick.cast_top5) + "</div>" : "") +
        renderKeywords(pick.keywords) +
      "</div>" +
    "</div>" +
    '<div class="card-actions">' +
      '<button class="lock-btn" onclick="lockIn()">✦ We\'re watching this one ✦</button>' +
      freezeBtn +
    "</div>" +
  "</div>";
}

function freezeMovie() {
  frozenGhibliMovie = currentGhibliPick;
  var frozenArea = document.getElementById("ghibli-frozen-area");
  var frozenCard = document.getElementById("ghibli-frozen-card");
  frozenCard.innerHTML = buildCardHtml(frozenGhibliMovie, GHIBLI_THUMBNAILS, false);
  frozenArea.style.display = "";
}

function unfreezeMovie() {
  frozenGhibliMovie = null;
  document.getElementById("ghibli-frozen-area").style.display = "none";
  document.getElementById("ghibli-frozen-card").innerHTML = "";
}

/* SHUFFLE QUEUE */
var ghibliShuffleQueue = [];
var ghibliSpiritLives = 3;
var ghibliSpiritActive = false;

function refillGhibliQueue() {
  ghibliShuffleQueue = GHIBLI_MOVIES.slice();
  for (var i = ghibliShuffleQueue.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = ghibliShuffleQueue[i]; ghibliShuffleQueue[i] = ghibliShuffleQueue[j]; ghibliShuffleQueue[j] = tmp;
  }
}

function resetGhibliScreen() {
  document.getElementById("ghibli-result-area").innerHTML = '<p class="result-empty">Press the button. The wind will decide.</p>';
  document.getElementById("ghibli-count-badge").textContent = "";
  document.getElementById("ghibli-final-girl-checkbox").checked = false;
  document.getElementById("ghibli-roll-btn").disabled = false;
  ghibliSpiritActive = false;
  ghibliSpiritLives = 3;
  renderGhibliSpirits();
  unfreezeMovie();
  currentGhibliPick = null;
}

function renderGhibliSpirits() {
  var container = document.getElementById("ghibli-ghost-lives");
  container.innerHTML = "";
  if (!ghibliSpiritActive) return;
  for (var i = 0; i < ghibliSpiritLives; i++) {
    var img = document.createElement("img");
    img.src = "assets/pikura-heart-20751_128.gif";
    img.className = "ghost-life";
    img.alt = "life";
    container.appendChild(img);
  }
}

document.getElementById("ghibli-final-girl-checkbox").addEventListener("change", function() {
  ghibliSpiritActive = this.checked;
  ghibliSpiritLives = 3;
  document.getElementById("ghibli-roll-btn").disabled = false;
  renderGhibliSpirits();
});

function killGhibliSpirit() {
  var container = document.getElementById("ghibli-ghost-lives");
  var spirits = container.querySelectorAll(".ghost-life");
  if (!spirits.length) return;
  var last = spirits[spirits.length - 1];
  last.classList.add("dying");
  setTimeout(function() { last.remove(); }, 600);
}

async function rollGhibliMovie() {
  var area  = document.getElementById("ghibli-result-area");
  var badge = document.getElementById("ghibli-count-badge");
  var btn   = document.getElementById("ghibli-roll-btn");

  if (ghibliSpiritActive) {
    if (ghibliSpiritLives <= 0) return;
    ghibliSpiritLives--;
    killGhibliSpirit();
    if (ghibliSpiritLives <= 0) {
      btn.disabled = true;
    }
  }

  area.innerHTML = '<div class="rolling"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  badge.textContent = "";

  await new Promise(function(r) { setTimeout(r, 800); });

  if (!GHIBLI_MOVIES.length) {
    area.innerHTML = '<div class="no-movies">No movies in the list yet.</div>';
    return;
  }

  if (!ghibliShuffleQueue.length) { refillGhibliQueue(); }
  var pick = ghibliShuffleQueue.pop();
  currentGhibliPick = pick;

  var remaining = ghibliShuffleQueue.length;
  var queueNote = ghibliSpiritActive
    ? (ghibliSpiritLives > 0 ? ghibliSpiritLives + " pick" + (ghibliSpiritLives !== 1 ? "s" : "") + " remaining" : "No more picks — the spell is spent!")
    : (remaining > 0 ? remaining + " left before any repeats" : "Full rotation complete — reshuffling...");

  area.innerHTML = buildCardHtml(pick, GHIBLI_THUMBNAILS, true);
  badge.textContent = queueNote;
}

/* INIT */
(function init() {
  fetch('./movies_enriched.csv')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var movies = parseCSV(text);
      movies.forEach(function(m) {
        if (m.id && m.id.startsWith('GHB')) {
          GHIBLI_MOVIES.push(m);
          GHIBLI_THUMBNAILS[m.id] = m.poster_file || (m.id + '.jpeg');
        }
      });
    })
    .catch(function(err) {
      document.body.innerHTML = '<div style="color:red;padding:2rem;font-family:monospace">Failed to load movie data: ' + err.message + '</div>';
    });
})();
</script>
</body>
</html>
