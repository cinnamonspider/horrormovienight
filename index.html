<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Night</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000001;
    --bg-card: #190B09;
    --beige: #D1BFAC;
    --cream: #F0F2F5;
    --dark: #070706;
  }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
    overflow: hidden;
  }

  /* INTRO OVERLAY */
  #intro-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 1s ease;
  }
  #intro-overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #intro-skip {
    position: absolute;
    bottom: 2rem;
    right: 2rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(240, 242, 245, 0.35);
    text-transform: uppercase;
    pointer-events: none;
    animation: blinkSkip 1.5s ease-in-out infinite;
  }
  @keyframes blinkSkip {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* MAIN SELECTOR */
  #selector {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #selector.visible { opacity: 1; }

  .selector-inner {
    max-width: 520px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: rgba(209, 191, 172, 0.5);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .main-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 7vw, 4rem);
    font-weight: 900;
    color: var(--cream);
    line-height: 1.05;
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }

  .main-subtitle {
    font-size: 1.1rem;
    color: var(--beige);
    font-style: italic;
    margin-bottom: 3rem;
    opacity: 0.7;
  }

  .genre-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    width: 100%;
    margin-bottom: 2.5rem;
  }

  .genre-card {
    background: var(--bg-card);
    border: 1px solid rgba(209, 191, 172, 0.15);
    border-radius: 4px;
    padding: 2rem 1.25rem 1.5rem;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
    overflow: hidden;
    transition: background 0.25s, border-color 0.25s;
  }
  .genre-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--beige);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .genre-card:hover {
    background: rgba(209, 191, 172, 0.07);
    border-color: rgba(209, 191, 172, 0.45);
  }
  .genre-card:hover::after { opacity: 1; }

  .genre-gif-wrap {
    width: 100%;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
  }
  .genre-gif {
    max-height: 110px;
    max-width: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: block;
  }
  .genre-card:hover .genre-gif { opacity: 1; }

  .genre-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .genre-desc {
    font-size: 0.85rem;
    color: var(--beige);
    font-style: italic;
    opacity: 0.6;
    line-height: 1.4;
  }

  .genre-arrow {
    margin-top: 1rem;
    color: var(--beige);
    font-size: 1rem;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .genre-card:hover .genre-arrow { opacity: 0.7; }

  .divider {
    border: none;
    border-top: 1px solid rgba(209, 191, 172, 0.12);
    width: 100%;
    margin-bottom: 1.5rem;
  }

  .footer-note {
    font-size: 0.78rem;
    color: rgba(240, 242, 245, 0.2);
    font-style: italic;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<div id="intro-overlay">
  <img src="assets/move_intro.gif" alt="" id="intro-gif">
  <span id="intro-skip">click to continue</span>
</div>

<div id="selector">
  <div class="selector-inner">
    <p class="eyebrow">Tonight's feature</p>
    <h1 class="main-title">What are we watching?</h1>
    <p class="main-subtitle">Choose your poison.</p>

    <div class="genre-grid">
      <a class="genre-card" href="horror.html" id="card-horror">
        <div class="genre-gif-wrap">
          <img class="genre-gif" src="assets/mxj_files-frog-9656_512.gif" alt="">
        </div>
        <div class="genre-name">Horror</div>
        <div class="genre-desc">Scream into the dark.</div>
        <div class="genre-arrow">→</div>
      </a>
      <a class="genre-card" href="comedy.html" id="card-comedy">
        <div class="genre-gif-wrap">
          <img class="genre-gif" src="assets/blendertimer-laughing-429.gif" alt="">
        </div>
        <div class="genre-name">Comedy</div>
        <div class="genre-desc">Laugh until it hurts.</div>
        <div class="genre-arrow">→</div>
      </a>
    </div>

    <hr class="divider">
    <p class="footer-note">A movie will be chosen for you. Resistance is futile.</p>
  </div>
</div>

<audio id="audio-horror-hover" src="music/fadingembersaudio-spooky-cartoon-ghost-wooo-430234.mp3"></audio>
<audio id="audio-comedy-hover" src="music/artificiallyinspired-90s-sitcom-laugh-track-353985.mp3"></audio>

<script>
  var overlay   = document.getElementById("intro-overlay");
  var selector  = document.getElementById("selector");

  function dismissIntro() {
    overlay.style.opacity = "0";
    setTimeout(function() {
      overlay.style.display = "none";
      document.body.style.overflow = "";
    }, 1000);
    selector.classList.add("visible");
  }

  overlay.addEventListener("click", dismissIntro);

  // Auto-dismiss after 5 seconds
  setTimeout(dismissIntro, 5000);

  // Hover sounds
  var horrorAudio = document.getElementById("audio-horror-hover");
  var comedyAudio = document.getElementById("audio-comedy-hover");
  horrorAudio.volume = 0.5;
  comedyAudio.volume = 0.45;

  function attachHoverSound(el, audio) {
    el.addEventListener("mouseenter", function() {
      audio.currentTime = 0;
      audio.play().catch(function() {});
    });
    el.addEventListener("mouseleave", function() {
      audio.pause();
      audio.currentTime = 0;
    });
  }

  attachHoverSound(document.getElementById("card-horror"), horrorAudio);
  attachHoverSound(document.getElementById("card-comedy"), comedyAudio);
</script>
</body>
</html>
